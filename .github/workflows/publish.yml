name: publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      HUGO_VERSION: '0.160.1'
      DART_SASS_VERSION: '1.99.0'
      BUNDLE_GEMFILE: ${{ github.workspace }}/src/Gemfile
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'src/go.mod'
          cache: false

      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - name: Create bin directory
        run: |
          set -euo pipefail
          mkdir -p ${GITHUB_WORKSPACE}/bin
          echo "${GITHUB_WORKSPACE}/bin/" >> $GITHUB_PATH

      - name: Create binstubs
        run: |
          set -euo pipefail
          bundle config set bin ${GITHUB_WORKSPACE}/bin
          bundle binstubs asciidoctor

      - name: Install Hugo
        run: |
          curl -qfsSL https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz -o hugo.tar.gz
          tar -C ${GITHUB_WORKSPACE}/bin/ -xzf hugo.tar.gz hugo
          rm hugo.tar.gz

      - name: Install Dart Sass
        run: |
          curl -qfsSL https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz -o dart-sass.tar.gz
          tar -C ${GITHUB_WORKSPACE}/bin/ -xzf dart-sass.tar.gz --strip-components=1
          rm dart-sass.tar.gz

      - name: Verify installations
        working-directory: src
        run: |
          set -euo pipefail
          hugo version | echo "hugo: $(cat -)"
          sass --version | echo "dart-sass: $(cat -)"
          asciidoctor --version | echo "asciidoctor: $(cat -)"
          go version | echo "go: $(cat -)"
          node --version | echo "node: $(cat -)"
          npm --version | echo "npm: $(cat -)"
          npx wrangler --version | echo "wrangler: $(cat -)"

      - run: npm ci
        working-directory: src

      - name: Set base URL
        id: base-url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=https://pr-${{ github.event.pull_request.number }}-aetos-blog.aetos.workers.dev" >> $GITHUB_OUTPUT
          else
            echo "value=${{ vars.CLOUDFLARE_WORKER_BASE_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        working-directory: src
        run: >
          hugo build
          --baseURL ${{ steps.base-url.outputs.value }}
          --environment production
          --minify

      - name: Deploy production
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd #v3.15.0
        if: github.ref == 'refs/heads/main'
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_DEPLOY_API_TOKEN }}
          command: deploy --config src/wrangler.jsonc

      - name: Deploy preview
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd #v3.15.0
        if: github.event_name == 'pull_request'
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_DEPLOY_API_TOKEN }}
          command: versions upload --config src/wrangler.jsonc --preview-alias pr-${{ github.event.pull_request.number }}
