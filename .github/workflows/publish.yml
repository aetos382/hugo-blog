name: publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened, labeled ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-24.04
    env:
      HUGO_VERSION: '0.160.1'
      DART_SASS_VERSION: '1.99.0'
      BUNDLE_GEMFILE: ${{ github.workspace }}/src/Gemfile
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'src/go.mod'
          cache: false

      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - name: Create directories
        run: |
          set -euo pipefail
          mkdir -p ${GITHUB_WORKSPACE}/bin
          mkdir -p ${GITHUB_WORKSPACE}/binstubs
          echo "${GITHUB_WORKSPACE}/bin/" >> $GITHUB_PATH
          echo "${GITHUB_WORKSPACE}/binstubs/" >> $GITHUB_PATH

      - name: Create binstubs
        run: |
          set -euo pipefail
          bundle config set bin ${GITHUB_WORKSPACE}/binstubs
          bundle binstubs asciidoctor

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-tools
        with:
          path: ${{ github.workspace }}/bin
          key: tools-hugo-${{ env.HUGO_VERSION }}-sass-${{ env.DART_SASS_VERSION }}

      - name: Install Hugo
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl --retry 3 --retry-delay 5 -qfsSL https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz -o hugo.tar.gz
          tar -C ${GITHUB_WORKSPACE}/bin/ -xzf hugo.tar.gz hugo
          rm hugo.tar.gz

      - name: Install Dart Sass
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl --retry 3 --retry-delay 5 -qfsSL https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz -o dart-sass.tar.gz
          tar -C ${GITHUB_WORKSPACE}/bin/ -xzf dart-sass.tar.gz --strip-components=1
          rm dart-sass.tar.gz

      - name: Verify installations
        working-directory: src
        run: |
          set -euo pipefail
          hugo version | echo "hugo: $(cat -)"
          sass --version | echo "dart-sass: $(cat -)"
          asciidoctor --version | echo "asciidoctor: $(cat -)"
          go version | echo "go: $(cat -)"
          node --version | echo "node: $(cat -)"
          npm --version | echo "npm: $(cat -)"
          npx wrangler --version | echo "wrangler: $(cat -)"

      - run: npm ci
        working-directory: src

      - name: Set build params
        id: build-params
        run: |
          if ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview') }}; then
            echo "base-url=https://pr-${{ github.event.pull_request.number }}-aetos-blog.aetos.workers.dev" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "minify=false" >> $GITHUB_OUTPUT
          else
            echo "base-url=${{ vars.CLOUDFLARE_WORKER_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "minify=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        working-directory: src
        run: >
          hugo build
          --baseURL ${{ steps.build-params.outputs.base-url }}
          --environment ${{ steps.build-params.outputs.environment }}
          --minify=${{ steps.build-params.outputs.minify }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-assets
          path: src/public
          if-no-files-found: error

      - name: Deploy production
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd #v3.15.0
        if: github.ref == 'refs/heads/main'
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_DEPLOY_API_TOKEN }}
          command: >
            deploy
            --config src/wrangler.jsonc
            --env production

      - name: Deploy preview
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd #v3.15.0
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview')
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_DEPLOY_API_TOKEN }}
          command: >
            versions upload
            --config src/wrangler.jsonc
            --preview-alias pr-${{ github.event.pull_request.number }}
            --env staging
